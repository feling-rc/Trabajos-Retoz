<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Trabajo general</title>

  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --stroke: #e6ebf1;
      --text: #1c2430;
      --muted: #7b8794;
      --shadow: 0 10px 28px rgba(15, 23, 42, 0.08);

      --green: #11b436;
      --green-dark: #414b56;

      --blue: #eaf4ff;
      --blue-text: #2b67b2;

      --purple: #f2e9ff;
      --purple-text: #7b4db2;

      --orange: #fff5e2;
      --orange-text: #c98300;

      --red: #fff0ef;
      --red-text: #d94841;

      --soft-green: #ecfdf3;
      --soft-green-text: #15803d;

      --soft-teal: #eafcf7;
      --soft-teal-text: #0f766e;

      --radius-xl: 22px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: auto;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(123, 77, 178, 0.05), transparent 28%),
        radial-gradient(circle at top left, rgba(17, 180, 54, 0.04), transparent 22%),
        var(--bg);
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      padding-bottom: 28px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 80;
      backdrop-filter: blur(12px);
      background: rgba(244, 246, 248, 0.9);
      border-bottom: 1px solid rgba(230, 235, 241, 0.88);
    }

    .topbar-inner {
      max-width: 820px;
      margin: 0 auto;
      padding: 12px 12px 14px;
      display: grid;
      gap: 10px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 10px;
    }

    .title {
      margin: 0;
      font-size: 19px;
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.25;
    }

    .count-pill {
      background: var(--surface);
      border: 1px solid var(--stroke);
      border-radius: 999px;
      box-shadow: var(--shadow);
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 50px;
      gap: 10px;
      align-items: center;
    }

    .search {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      background: var(--surface);
      border: 1px solid var(--stroke);
      border-radius: 999px;
      box-shadow: var(--shadow);
      padding: 12px 14px;
    }

    .search svg {
      width: 18px;
      height: 18px;
      color: var(--muted);
      flex: 0 0 auto;
    }

    .search input {
      width: 100%;
      min-width: 0;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 15px;
    }

    .search input::placeholder {
      color: #9ba5b3;
    }

    .icon-btn {
      width: 50px;
      height: 50px;
      border: 1px solid var(--stroke);
      background: var(--surface);
      border-radius: 999px;
      box-shadow: var(--shadow);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .icon-btn svg {
      width: 20px;
      height: 20px;
      color: var(--text);
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .loading-box,
    .empty-box,
    .error-box,
    .notice {
      background: var(--surface);
      border: 1px solid var(--stroke);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 14px;
      font-size: 13px;
      line-height: 1.35;
      color: var(--muted);
      text-align: center;
    }

    .notice {
      color: #8a5b00;
      border-color: #f0d9a6;
      background: #fff8eb;
    }

    .cards {
      display: grid;
      gap: 10px;
    }

    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(230, 235, 241, 0.98);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 12px;
      display: grid;
      gap: 10px;
      overflow: visible;
    }

    .card.menu-open {
      z-index: 20;
    }

    .card-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 136px;
      gap: 10px;
      align-items: start;
    }

    .card-left {
      min-width: 0;
      display: grid;
      gap: 8px;
    }

    .title-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      min-width: 0;
    }

    .title-main {
      min-width: 0;
      font-size: 16px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -0.02em;
      word-break: break-word;
      text-transform: uppercase;
      flex: 1 1 auto;
    }

    .mini-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #f8fafc;
      border: 1px solid var(--stroke);
      font-size: 10px;
      font-weight: 900;
      color: #64748b;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .mini-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #d0d5dd;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.03);
    }

    .mini-dot.on {
      background: #16a34a;
      box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.1);
    }

    .detail-box {
      background: linear-gradient(180deg, #fbfcfd 0%, #f8fafc 100%);
      border: 1px solid var(--stroke);
      border-radius: 16px;
      padding: 10px 11px;
      display: grid;
      gap: 5px;
      min-height: 78px;
    }

    .k-label {
      font-size: 10px;
      font-weight: 900;
      color: var(--muted);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      line-height: 1.15;
    }

    .detail-text {
      font-size: 12px;
      line-height: 1.35;
      color: var(--text);
      word-break: break-word;
      white-space: pre-wrap;
    }

    .card-right {
      display: grid;
      gap: 6px;
      align-content: start;
      min-width: 0;
    }

    .chip-wrap {
      position: relative;
      min-width: 0;
    }

    .chip-btn {
      width: 100%;
      min-height: 38px;
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 7px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(16, 24, 40, 0.08);
      text-align: left;
    }

    .chip-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .chip-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      flex: 0 0 auto;
      background: currentColor;
      opacity: 0.95;
    }

    .chip-text {
      min-width: 0;
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .chip-caption {
      font-size: 9px;
      line-height: 1;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      opacity: 0.72;
    }

    .chip-value {
      min-width: 0;
      font-size: 12px;
      line-height: 1.1;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chip-arrow {
      width: 8px;
      height: 8px;
      border-right: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: rotate(45deg) translateY(-1px);
      opacity: 0.75;
      flex: 0 0 auto;
      margin-left: 2px;
    }

    .chip-default {
      background: #f2f4f7;
      color: #667085;
      border-color: #e5e7eb;
    }

    .chip-agendado {
      background: var(--blue);
      color: var(--blue-text);
      border-color: #d8e8ff;
    }

    .chip-proceso {
      background: var(--purple);
      color: var(--purple-text);
      border-color: #e7d7ff;
    }

    .chip-sinmaterial {
      background: var(--orange);
      color: var(--orange-text);
      border-color: #fde7b2;
    }

    .chip-atrasado {
      background: var(--red);
      color: var(--red-text);
      border-color: #ffd7d4;
    }

    .chip-trabajado {
      background: var(--soft-green);
      color: var(--soft-green-text);
      border-color: #cbf7d8;
    }

    .chip-completado {
      background: #eef2ff;
      color: #6941c6;
      border-color: #ddd6fe;
    }

    .chip-entregado {
      background: var(--soft-teal);
      color: var(--soft-teal-text);
      border-color: #c9f5eb;
    }

    .dropdown-menu {
      position: absolute;
      right: 0;
      top: calc(100% + 6px);
      width: 220px;
      max-height: 240px;
      overflow-y: auto;
      background: var(--surface);
      border: 1px solid var(--stroke);
      border-radius: 16px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.16);
      padding: 8px;
      display: none;
      z-index: 120;
    }

    .dropdown-menu.open {
      display: block;
    }

    .dropdown-menu.up {
      top: auto;
      bottom: calc(100% + 6px);
    }

    .menu-option {
      width: 100%;
      border: none;
      background: transparent;
      display: flex;
      align-items: center;
      gap: 10px;
      border-radius: 12px;
      padding: 9px 10px;
      cursor: pointer;
      text-align: left;
      color: var(--text);
      font-size: 12px;
      font-weight: 800;
    }

    .menu-option:hover {
      background: #f8fafc;
    }

    .menu-option .opt-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      flex: 0 0 auto;
      background: #c4c9d1;
    }

    .menu-option .check {
      margin-left: auto;
      font-size: 13px;
      opacity: 0;
    }

    .menu-option.active .check {
      opacity: 1;
    }

    .actions {
      display: grid;
      gap: 8px;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 11px 12px;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.1s ease, opacity 0.1s ease;
    }

    .btn:active {
      transform: scale(0.992);
    }

    .btn:disabled {
      opacity: 0.72;
      cursor: not-allowed;
    }

    .btn-green {
      color: #fff;
      background: linear-gradient(180deg, #11b53a 0%, #0b9e32 100%);
      box-shadow: 0 8px 20px rgba(11, 158, 50, 0.2);
    }

    .btn-dark {
      color: #fff;
      background: linear-gradient(180deg, #4f5b69 0%, #3e4652 100%);
      box-shadow: 0 8px 20px rgba(57, 65, 76, 0.18);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%) translateY(16px);
      z-index: 160;
      min-width: min(92vw, 280px);
      max-width: min(92vw, 420px);
      background: #111827;
      color: #fff;
      padding: 11px 14px;
      border-radius: 14px;
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.24);
      opacity: 0;
      pointer-events: none;
      transition: 0.22s ease;
      font-size: 12px;
      line-height: 1.35;
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.error {
      background: #b42318;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(15, 23, 42, 0.58);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .login-card {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 24px;
      box-shadow: 0 20px 54px rgba(15, 23, 42, 0.24);
      padding: 20px 16px 16px;
      display: grid;
      gap: 14px;
    }

    .login-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .login-sub {
      margin: 0;
      font-size: 12px;
      line-height: 1.35;
      color: var(--muted);
    }

    .login-card input {
      width: 100%;
      border: 1px solid #d8dee6;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 20px;
      font-weight: 900;
      text-align: center;
      letter-spacing: 4px;
      outline: none;
      background: #fbfcfe;
    }

    .login-error {
      min-height: 18px;
      font-size: 12px;
      color: #b42318;
      text-align: center;
    }

    .hidden {
      display: none !important;
    }

    @media (min-width: 760px) {
      .cards {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 420px) {
      .card-top {
        grid-template-columns: minmax(0, 1fr) 126px;
      }

      .title-main {
        font-size: 15px;
      }

      .dropdown-menu {
        width: 204px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div id="loginOverlay" class="overlay">
      <div class="login-card">
        <div>
          <h1 class="login-title">Trabajo general</h1>
          <p class="login-sub">Ingresa el código para abrir el panel del supervisor.</p>
        </div>

        <input
          id="codeInput"
          type="password"
          maxlength="6"
          inputmode="numeric"
          placeholder="••••••"
          autocomplete="off"
        />

        <button id="loginBtn" class="btn btn-green" type="button">Entrar</button>
        <div id="loginError" class="login-error"></div>
      </div>
    </div>

    <header class="topbar">
      <div class="topbar-inner">
        <div class="hero">
          <div>
            <h1 class="title">Trabajo general</h1>
            <div class="subtitle">Panel compacto para supervisor</div>
          </div>
          <div id="countBadge" class="count-pill">0 pares</div>
        </div>

        <div class="toolbar">
          <div class="search">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M21 21l-4.35-4.35M10.8 18a7.2 7.2 0 1 0 0-14.4 7.2 7.2 0 0 0 0 14.4Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <input
              id="searchInput"
              type="text"
              placeholder="Buscar orden, modelo, detalle, responsable..."
              autocomplete="off"
            />
          </div>

          <button id="refreshBtn" class="icon-btn" type="button" title="Actualizar">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M21 12a9 9 0 1 1-2.64-6.36M21 4v6h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="container">
      <div id="demoNotice" class="notice hidden">
        No se pudieron cargar opciones del backend. Se están usando opciones por defecto del frontend.
      </div>

      <div id="loadingBox" class="loading-box">Cargando trabajos...</div>
      <div id="errorBox" class="error-box hidden"></div>
      <div id="emptyBox" class="empty-box hidden">No hay trabajos para mostrar.</div>
      <div id="cards" class="cards hidden"></div>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const API_ROOT = "/trabajo-general/api";
    const STORAGE_TOKEN_KEY = "trabajo_general_token";
    const REFRESH_MS = 8000;

    const DEFAULT_OPTIONS = {
      responsables: [

      ],

        { value: "Agendado con Courier", label: "Agendado con courier" },

        { value: "in_progress", label: "Agendado" },

      ]
    };

    const STATUS_CLASS_MAP = {
      "Agendado": "chip-agendado",
      "En ruta": "chip-proceso",
      "En proceso": "chip-proceso",
      "Sin material": "chip-sinmaterial",
      "Atrasado": "chip-atrasado",
      "Trabajado": "chip-trabajado",

      "Empaquetado": "chip-default",
      "Agendado con courier": "chip-default"
    };

    const STATUS_DOT_MAP = {
      "Agendado": "#2b67b2",
      "En ruta": "#7b4db2",
      "En proceso": "#7b4db2",
      "Sin material": "#c98300",
      "Atrasado": "#d94841",
      "Trabajado": "#16a34a",
      "Completado": "#6941c6",
      "Entregado": "#0f766e",
      "Cancelado": "#ef4444",
      "Ya no quiere": "#ef4444",
      "Agendar con bot": "#667085",
      "Empaquetado": "#16a34a",
      "Agendado con courier": "#0ea5e9"
    };

    let TOKEN = sessionStorage.getItem(STORAGE_TOKEN_KEY) || "";
    let OPTIONS = JSON.parse(JSON.stringify(DEFAULT_OPTIONS));
    let TASKS = [];
    let REFRESH_TIMER = null;
    let SAVING_IDS = new Set();
    let OPEN_DROPDOWN = null;
    let LAST_SCROLL_Y = 0;

    function byId(id) {
      return document.getElementById(id);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showToast(message, isError = false) {
      const toast = byId("toast");
      toast.textContent = message || "";
      toast.className = "toast show" + (isError ? " error" : "");
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => {
        toast.className = "toast";
      }, 2400);
    }

    function showLogin(show = true) {
      byId("loginOverlay").classList.toggle("hidden", !show);
    }

    function setLoading(message = "Cargando trabajos...") {
      byId("loadingBox").textContent = message;
      byId("loadingBox").classList.remove("hidden");
      byId("errorBox").classList.add("hidden");
      byId("emptyBox").classList.add("hidden");
      byId("cards").classList.add("hidden");
    }

    function clearMessages() {
      byId("loadingBox").classList.add("hidden");
      byId("errorBox").classList.add("hidden");
      byId("emptyBox").classList.add("hidden");
    }

    function setError(message) {
      byId("loadingBox").classList.add("hidden");
      byId("cards").classList.add("hidden");
      byId("emptyBox").classList.add("hidden");
      byId("errorBox").textContent = message || "Ocurrió un error.";
      byId("errorBox").classList.remove("hidden");
    }

    function saveScroll() {
      LAST_SCROLL_Y = window.scrollY || window.pageYOffset || 0;
    }

    function restoreScroll() {
      requestAnimationFrame(() => {
        window.scrollTo({ top: LAST_SCROLL_Y, left: 0, behavior: "auto" });
      });
    }

    function cleanDigits(value) {
      return String(value || "").replace(/\D+/g, "");
    }

    function dedupeOptions(list, currentValue, currentLabel = null) {
      const out = [];
      const seen = new Set();

      if (currentValue && !list.some(x => String(x.value) === String(currentValue))) {
        out.push({
          value: currentValue,
          label: currentLabel || currentValue
        });
        seen.add(String(currentValue));
      }

      for (const item of list || []) {
        const key = String(item.value);
        if (seen.has(key)) continue;
        seen.add(key);
        out.push(item);
      }

      return out;
    }

    function estadoBonitoFromCode(code) {
      const key = String(code || "").trim();
      const match = OPTIONS.estados.find(x => String(x.value) === key);
      return match ? match.label : (key || "-");
    }

    function statusClass(label) {
      return STATUS_CLASS_MAP[label] || "chip-default";
    }

    function statusDotColor(label) {
      return STATUS_DOT_MAP[label] || "#667085";
    }

    function isListo(task) {
      return String(task.estado_code || "").trim() === "TRABAJADO";
    }

    function normalizeTask(raw) {
      const ordenTexto =
        raw.orden_texto ||
        (Array.isArray(raw.x_studio_orden_de_venta_1) ? raw.x_studio_orden_de_venta_1[1] : "") ||
        "";

      const estadoCode =
        raw.estado_code ||
        raw.x_studio_selection_field_3j_1ivn1ho1m ||
        "";

      const estadoLabel =
        raw.estado_label ||
        estadoBonitoFromCode(estadoCode);

      return {
        id: raw.id,
        modelo: raw.modelo || raw.x_studio_modelo_de_par_1 || "Sin modelo",
        detalle: raw.detalle || raw.x_studio_detalles_del_trabajo_1 || "",
        estado_code: estadoCode,
        estado_label: estadoLabel,
        orden_texto: ordenTexto,
        orden_numero: raw.orden_numero || cleanDigits(ordenTexto),
        pasadores:
          typeof raw.pasadores !== "undefined" ? raw.pasadores : !!raw.x_studio_pasadores_1,
        plantillas:
          typeof raw.plantillas !== "undefined" ? raw.plantillas : !!raw.x_studio_plantillas_1,
        responsable: raw.responsable || raw.x_studio_responsable_r || "",
        ubicacion_seguimiento: raw.ubicacion_seguimiento || raw.x_studio_ubicacion_exacta_1 || "",
        trabajado_por: raw.trabajado_por || raw.x_studio_trabajado_por || ""
      };
    }

    function filterTasks() {
      const q = (byId("searchInput").value || "").trim().toLowerCase();
      if (!q) return TASKS;

      return TASKS.filter(task => {
        const blob = [
          task.orden_texto,
          task.orden_numero,
          task.modelo,
          task.detalle,
          task.estado_label,
          task.responsable,
          task.ubicacion_seguimiento,
          task.trabajado_por
        ].join(" ").toLowerCase();

        return blob.includes(q);
      });
    }

    function mergeTask(updated) {
      const idx = TASKS.findIndex(x => String(x.id) === String(updated.id));
      if (idx >= 0) {
        TASKS[idx] = {
          ...TASKS[idx],
          ...normalizeTask(updated)
        };
      }
    }

    function patchTask(tareaId, patch) {
      const idx = TASKS.findIndex(x => String(x.id) === String(tareaId));
      if (idx >= 0) {
        TASKS[idx] = {
          ...TASKS[idx],
          ...patch
        };
      }
    }

    async function api(path, method = "GET", body = null) {
      const headers = {};

      if (TOKEN) headers["X-Encargado-Token"] = TOKEN;
      if (body !== null) headers["Content-Type"] = "application/json";

      const response = await fetch(API_ROOT + path, {
        method,
        headers,
        body: body !== null ? JSON.stringify(body) : undefined,
        cache: "no-store"
      });

      const data = await response.json().catch(() => ({}));

      if (response.status === 401) {
        TOKEN = "";
        sessionStorage.removeItem(STORAGE_TOKEN_KEY);
        showLogin(true);
        throw new Error(data.error || "Tu sesión venció.");
      }

      if (!response.ok) {
        throw new Error(data.error || "No se pudo completar la operación.");
      }

      return data;
    }

    async function loadOptions() {
      byId("demoNotice").classList.add("hidden");
      try {
        const data = await api("/options", "GET");
        OPTIONS = {
          responsables: Array.isArray(data.responsables) && data.responsables.length ? data.responsables : DEFAULT_OPTIONS.responsables,
          ubicaciones: Array.isArray(data.ubicaciones) && data.ubicaciones.length ? data.ubicaciones : DEFAULT_OPTIONS.ubicaciones,
          trabajado_por: Array.isArray(data.trabajado_por) && data.trabajado_por.length ? data.trabajado_por : DEFAULT_OPTIONS.trabajado_por,
          estados: Array.isArray(data.estados) && data.estados.length ? data.estados : DEFAULT_OPTIONS.estados
        };
      } catch (error) {
        OPTIONS = JSON.parse(JSON.stringify(DEFAULT_OPTIONS));
        byId("demoNotice").classList.remove("hidden");
      }
    }

    async function loadTasks(silent = false) {
      if (!silent) setLoading("Cargando trabajos...");

      try {
        const data = await api("/tasks", "GET");
        TASKS = (Array.isArray(data.result) ? data.result : []).map(normalizeTask);
        renderTasks();
      } catch (error) {
        if (!TASKS.length) setError(error.message || "No se pudieron cargar los trabajos.");
        else showToast(error.message || "No se pudo actualizar.", true);
      }
    }

    function renderTasks() {
      clearMessages();
      closeAllDropdowns(true);

      const filtered = filterTasks();
      byId("countBadge").textContent = `${filtered.length} pares`;

      if (!filtered.length) {
        byId("cards").classList.add("hidden");
        byId("emptyBox").classList.remove("hidden");
        return;
      }

      byId("emptyBox").classList.add("hidden");
      byId("cards").innerHTML = filtered.map(cardHtml).join("");
      byId("cards").classList.remove("hidden");
      bindEvents();
    }

    function closeAllDropdowns(skipStateReset = false) {
      document.querySelectorAll(".dropdown-menu.open").forEach(el => {
        el.classList.remove("open", "up");
      });
      document.querySelectorAll(".card.menu-open").forEach(el => {
        el.classList.remove("menu-open");
      });
      if (!skipStateReset) OPEN_DROPDOWN = null;
    }

    function openDropdown(taskId, type) {
      const key = `${taskId}_${type}`;
      const menu = document.querySelector(`[data-dropdown-menu="${key}"]`);
      const card = document.querySelector(`.card[data-id="${taskId}"]`);
      if (!menu || !card) return;

      closeAllDropdowns();

      OPEN_DROPDOWN = { taskId, type };
      card.classList.add("menu-open");
      menu.classList.add("open");

      const rect = menu.getBoundingClientRect();
      const overBottom = rect.bottom > window.innerHeight - 10;
      const hasMoreTop = rect.top > (window.innerHeight - rect.bottom);

      if (overBottom && hasMoreTop) {
        menu.classList.add("up");
      } else {
        menu.classList.remove("up");
      }
    }

    async function quickUpdateTask(tareaId, payloadData, onRollback, successMsg, patch = null) {
      const key = String(tareaId);
      if (SAVING_IDS.has(key)) return;

      saveScroll();
      SAVING_IDS.add(key);

      if (patch) {
        patchTask(tareaId, patch);
        renderTasks();
        restoreScroll();
      }

      try {
        const data = await api(`/task/${tareaId}/update`, "POST", { data: payloadData });
        if (data.task) mergeTask(data.task);
        renderTasks();
        restoreScroll();
        showToast(successMsg || data.message || "Actualizado.");
      } catch (error) {
        if (typeof onRollback === "function") onRollback();
        await loadTasks(true);
        restoreScroll();
        showToast(error.message || "No se pudo guardar.", true);
      } finally {
        SAVING_IDS.delete(key);
      }
    }

    async function doToggleListo(tareaId) {
      const key = String(tareaId);
      if (SAVING_IDS.has(key)) return;

      const current = TASKS.find(x => String(x.id) === String(tareaId));
      if (!current) return;

      if (!isListo(current) && !String(current.trabajado_por || "").trim()) {
        showToast("Primero debes seleccionar Trabajado por", true);
        return;
      }

      saveScroll();
      SAVING_IDS.add(key);

      const estabaListo = isListo(current);

      if (!estabaListo) {
        patchTask(tareaId, {
          estado_code: "TRABAJADO",
          estado_label: "Trabajado"
        });
      } else {
        patchTask(tareaId, {
          estado_code: "03_approved",
          estado_label: "En proceso",
          trabajado_por: ""
        });
      }

      renderTasks();
      restoreScroll();

      try {
        const body = !estabaListo ? { trabajado_por: current.trabajado_por } : {};
        const data = await api(`/task/${tareaId}/toggle_listo`, "POST", body);
        if (data.task) mergeTask(data.task);
        renderTasks();
        restoreScroll();
        showToast(data.message || "Actualizado.");
      } catch (error) {
        await loadTasks(true);
        restoreScroll();
        showToast(error.message || "No se pudo cambiar el listo.", true);
      } finally {
        SAVING_IDS.delete(key);
      }
    }

    function bindEvents() {
      document.querySelectorAll(".js-chip-btn").forEach(btn => {
        btn.addEventListener("click", function (e) {
          e.stopPropagation();
          const taskId = this.dataset.id;
          const type = this.dataset.type;
          const sameOpen =
            OPEN_DROPDOWN &&
            String(OPEN_DROPDOWN.taskId) === String(taskId) &&
            OPEN_DROPDOWN.type === type;

          if (sameOpen) {
            closeAllDropdowns();
            return;
          }

          openDropdown(taskId, type);
        });
      });

      document.querySelectorAll(".js-menu-option").forEach(btn => {
        btn.addEventListener("click", async function (e) {
          e.stopPropagation();

          const tareaId = this.dataset.id;
          const type = this.dataset.type;
          const value = this.dataset.value || "";
          const task = TASKS.find(x => String(x.id) === String(tareaId));
          if (!task) return;

          closeAllDropdowns();

          if (type === "estado") {
            const prevCode = task.estado_code;
            const prevLabel = task.estado_label;
            const newLabel = estadoBonitoFromCode(value);

            await quickUpdateTask(
              tareaId,
              { x_studio_selection_field_3j_1ivn1ho1m: value || false },
              () => {
                patchTask(tareaId, {
                  estado_code: prevCode,
                  estado_label: prevLabel
                });
              },
              "Estado actualizado.",
              {
                estado_code: value,
                estado_label: newLabel
              }
            );
            return;
          }

          if (type === "responsable") {
            const prev = task.responsable || "";
            await quickUpdateTask(
              tareaId,
              { x_studio_responsable_r: value || false },
              () => {
                patchTask(tareaId, { responsable: prev });
              },
              "Responsable actualizado.",
              {
                responsable: value || ""
              }
            );
            return;
          }

          if (type === "ubicacion") {
            const prev = task.ubicacion_seguimiento || "";
            await quickUpdateTask(
              tareaId,
              { x_studio_ubicacion_exacta_1: value || false },
              () => {
                patchTask(tareaId, { ubicacion_seguimiento: prev });
              },
              "Ubicación actualizada.",
              {
                ubicacion_seguimiento: value || ""
              }
            );
            return;
          }

          const prevTrab = task.trabajado_por || "";
          await quickUpdateTask(
            tareaId,
            { x_studio_trabajado_por: value || false },
            () => {
              patchTask(tareaId, { trabajado_por: prevTrab });
            },
            "Trabajado por actualizado.",
            {
              trabajado_por: value || ""
            }
          );
        });
      });

      document.querySelectorAll(".js-toggle-listo").forEach(btn => {
        btn.addEventListener("click", async function () {
          const tareaId = this.dataset.id;
          const task = TASKS.find(t => String(t.id) === String(tareaId));
          if (!task) return;

          if (isListo(task)) {
            const ok = confirm("La tarea ya está en LISTO. ¿Deseas desmarcarla?");
            if (!ok) return;
          }

          await doToggleListo(tareaId);
        });
      });
    }

    async function doLogin() {
      const input = byId("codeInput");
      const err = byId("loginError");
      err.textContent = "";

      try {
        const code = (input.value || "").trim();
        if (!code) {
          err.textContent = "Ingresa el código.";
          return;
        }

        const response = await fetch(API_ROOT + "/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code })
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || "Código inválido.");

        TOKEN = data.token || "";
        sessionStorage.setItem(STORAGE_TOKEN_KEY, TOKEN);
        input.value = "";

        showLogin(false);
        await initProtected();
        showToast("Acceso concedido.");
      } catch (error) {
        err.textContent = error.message || "No se pudo ingresar.";
      }
    }

    async function initProtected() {
      await loadOptions();
      await loadTasks(false);
      startAutoRefresh();
    }

    function startAutoRefresh() {
      clearInterval(REFRESH_TIMER);
      REFRESH_TIMER = setInterval(async () => {
        if (!TOKEN) return;
        if (SAVING_IDS.size > 0) return;
        if (OPEN_DROPDOWN) return;

        const currentSearch = byId("searchInput").value;
        saveScroll();
        await loadTasks(true);
        byId("searchInput").value = currentSearch;
        renderTasks();
        restoreScroll();
      }, REFRESH_MS);
    }

    window.addEventListener("click", function () {
      if (OPEN_DROPDOWN) {
        closeAllDropdowns();
      }
    });

    window.addEventListener("resize", function () {
      if (OPEN_DROPDOWN) {
        closeAllDropdowns();
      }
    });

    window.addEventListener("scroll", function () {
      if (OPEN_DROPDOWN) {
        closeAllDropdowns();
      }
    }, { passive: true });

    window.addEventListener("load", async () => {
      byId("loginBtn").addEventListener("click", doLogin);

      byId("codeInput").addEventListener("keydown", e => {
        if (e.key === "Enter") doLogin();
      });

      byId("searchInput").addEventListener("input", () => {
        saveScroll();
        renderTasks();
        restoreScroll();
      });

      byId("refreshBtn").addEventListener("click", async () => {
        const currentSearch = byId("searchInput").value;
        saveScroll();
        await loadTasks(true);
        byId("searchInput").value = currentSearch;
        renderTasks();
        restoreScroll();
      });

      if (TOKEN) {
        try {
          showLogin(false);
          await initProtected();
        } catch (error) {
          TOKEN = "";
          sessionStorage.removeItem(STORAGE_TOKEN_KEY);
          showLogin(true);
          setLoading("Cargando trabajos...");
        }
      } else {
        showLogin(true);
        setLoading("Cargando trabajos...");
      }
    });
  </script>
</body>
</html>
