<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Trabajo general</title>

  <style>
    :root {
      --bg: #f3f5f8;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --stroke: #e7ebf0;
      --text: #1c2430;
      --muted: #7a8594;
      --shadow: 0 10px 28px rgba(16, 24, 40, 0.08);

      --green: #13a538;
      --green-dark: #404854;
      --purple: #8b63aa;

      --chip-ag: #eaf4ff;
      --chip-ag-text: #245ea8;

      --chip-pr: #f3ecff;
      --chip-pr-text: #7b4db2;

      --chip-sm: #fff7e8;
      --chip-sm-text: #ca8a04;

      --chip-at: #fff1f0;
      --chip-at-text: #d94841;

      --chip-tr: #ecfdf3;
      --chip-tr-text: #15803d;

      --chip-co: #eef2ff;
      --chip-co-text: #6941c6;

      --chip-de: #ecfdf5;
      --chip-de-text: #047857;

      --radius-xl: 22px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: auto;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(139, 99, 170, 0.06), transparent 28%),
        radial-gradient(circle at top left, rgba(19, 165, 56, 0.05), transparent 24%),
        var(--bg);
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      padding-bottom: 32px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(12px);
      background: rgba(243, 245, 248, 0.92);
      border-bottom: 1px solid rgba(231, 235, 240, 0.75);
    }

    .topbar-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 12px 12px 14px;
      display: grid;
      gap: 10px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .title {
      margin: 0;
      font-size: 19px;
      line-height: 1.1;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.25;
    }

    .count-pill {
      background: var(--surface);
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 50px;
      gap: 10px;
      align-items: center;
    }

    .search {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      border-radius: 999px;
      border: 1px solid var(--stroke);
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 12px 14px;
    }

    .search svg {
      width: 18px;
      height: 18px;
      color: var(--muted);
      flex: 0 0 auto;
    }

    .search input {
      width: 100%;
      min-width: 0;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 15px;
    }

    .search input::placeholder {
      color: #9aa4b2;
    }

    .icon-btn {
      width: 50px;
      height: 50px;
      border: 1px solid var(--stroke);
      background: var(--surface);
      border-radius: 999px;
      box-shadow: var(--shadow);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .icon-btn svg {
      width: 20px;
      height: 20px;
      color: var(--text);
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .loading-box,
    .empty-box,
    .error-box,
    .notice {
      background: var(--surface);
      border: 1px solid var(--stroke);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 14px;
      font-size: 13px;
      line-height: 1.35;
      color: var(--muted);
      text-align: center;
    }

    .notice {
      color: #8a5b00;
      border-color: #f0d9a6;
      background: #fff8eb;
    }

    .cards {
      display: grid;
      gap: 10px;
    }

    .card {
      position: relative;
      background: rgba(255,255,255,0.95);
      border: 1px solid rgba(231, 235, 240, 0.92);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 12px;
      display: grid;
      gap: 10px;
      overflow: visible;
    }

    .head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .title-line {
      min-width: 0;
      font-size: 16px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -0.025em;
      word-break: break-word;
      text-transform: uppercase;
    }

    .title-line .orden-inline {
      color: #5b6472;
      font-weight: 800;
      margin-right: 4px;
    }

    .detail-box {
      background: linear-gradient(180deg, #fbfcfd 0%, #f8fafc 100%);
      border: 1px solid var(--stroke);
      border-radius: 16px;
      padding: 10px 11px;
      display: grid;
      gap: 5px;
    }

    .k-label {
      font-size: 10px;
      font-weight: 900;
      color: var(--muted);
      letter-spacing: .07em;
      text-transform: uppercase;
      line-height: 1.15;
    }

    .detail-text {
      font-size: 12px;
      line-height: 1.35;
      color: var(--text);
      word-break: break-word;
      white-space: pre-wrap;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .mini-card {
      background: var(--surface-2);
      border: 1px solid var(--stroke);
      border-radius: 14px;
      padding: 8px 9px;
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .mini-value {
      font-size: 12px;
      line-height: 1.2;
      font-weight: 800;
      word-break: break-word;
      color: var(--text);
    }

    .tiny-grid {
      display: grid;
      grid-template-columns: 62px 62px 1fr 1fr;
      gap: 8px;
      align-items: stretch;
    }

    .tiny-box {
      background: var(--surface-2);
      border: 1px solid var(--stroke);
      border-radius: 14px;
      padding: 7px 8px;
      display: grid;
      place-items: center;
      gap: 3px;
      min-height: 58px;
    }

    .tiny-box .k-label {
      font-size: 9px;
      letter-spacing: .08em;
    }

    .tiny-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #d0d5dd;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.03);
    }

    .tiny-dot.on {
      background: #16a34a;
      box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.10);
    }

    .compact-select {
      background: var(--surface-2);
      border: 1px solid var(--stroke);
      border-radius: 14px;
      padding: 7px 8px;
      display: grid;
      gap: 5px;
      min-height: 58px;
      min-width: 0;
    }

    .compact-select select {
      width: 100%;
      border: 1px solid #d8dee6;
      background:
        linear-gradient(45deg, transparent 50%, #667085 50%),
        linear-gradient(135deg, #667085 50%, transparent 50%),
        linear-gradient(180deg, #fff 0%, #fbfcfe 100%);
      background-position:
        calc(100% - 16px) calc(50% - 3px),
        calc(100% - 10px) calc(50% - 3px),
        0 0;
      background-size:
        6px 6px,
        6px 6px,
        100% 100%;
      background-repeat: no-repeat;
      border-radius: 11px;
      padding: 8px 32px 8px 9px;
      font-size: 12px;
      font-weight: 800;
      color: var(--text);
      appearance: none;
      outline: none;
      min-width: 0;
    }

    .status-wrap {
      position: relative;
      flex: 0 0 auto;
      z-index: 20;
    }

    .status-btn {
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 7px 11px;
      min-height: 34px;
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 4px 12px rgba(16, 24, 40, 0.08);
    }

    .status-btn::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.98;
    }

    .status-btn::after {
      content: "";
      width: 7px;
      height: 7px;
      border-right: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: rotate(45deg) translateY(-1px);
      margin-left: 2px;
      opacity: 0.75;
    }

    .status-default {
      background: #f2f4f7;
      color: #667085;
      border-color: #e5e7eb;
    }

    .status-agendado {
      background: var(--chip-ag);
      color: var(--chip-ag-text);
      border-color: #d7e8ff;
    }

    .status-proceso {
      background: var(--chip-pr);
      color: var(--chip-pr-text);
      border-color: #eadbff;
    }

    .status-sinmaterial {
      background: var(--chip-sm);
      color: var(--chip-sm-text);
      border-color: #fde7b2;
    }

    .status-atrasado {
      background: var(--chip-at);
      color: var(--chip-at-text);
      border-color: #ffd7d4;
    }

    .status-trabajado {
      background: var(--chip-tr);
      color: var(--chip-tr-text);
      border-color: #cbf7d8;
    }

    .status-completado {
      background: var(--chip-co);
      color: var(--chip-co-text);
      border-color: #ddd6fe;
    }

    .status-entregado {
      background: var(--chip-de);
      color: var(--chip-de-text);
      border-color: #bbf7d0;
    }

    .status-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: 210px;
      background: var(--surface);
      border: 1px solid var(--stroke);
      border-radius: 16px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.16);
      padding: 8px;
      display: none;
    }

    .status-menu.open {
      display: block;
    }

    .status-option {
      width: 100%;
      border: none;
      background: transparent;
      display: flex;
      align-items: center;
      gap: 10px;
      border-radius: 12px;
      padding: 9px 10px;
      cursor: pointer;
      text-align: left;
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
    }

    .status-option:hover {
      background: #f8fafc;
    }

    .status-option .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      flex: 0 0 auto;
    }

    .status-option .check {
      margin-left: auto;
      font-size: 13px;
      opacity: 0;
    }

    .status-option.active .check {
      opacity: 1;
    }

    .actions {
      display: grid;
      gap: 8px;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 11px 12px;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      transition: transform .1s ease, opacity .1s ease;
    }

    .btn:active {
      transform: scale(.992);
    }

    .btn:disabled {
      opacity: 0.72;
      cursor: not-allowed;
    }

    .btn-green {
      color: #fff;
      background: linear-gradient(180deg, #11b53a 0%, #0b9e32 100%);
      box-shadow: 0 8px 20px rgba(11, 158, 50, 0.20);
    }

    .btn-dark {
      color: #fff;
      background: linear-gradient(180deg, #4f5b69 0%, #3e4652 100%);
      box-shadow: 0 8px 20px rgba(57, 65, 76, 0.18);
    }

    .btn-muted {
      color: #fff;
      background: linear-gradient(180deg, #8b95a3 0%, #6b7280 100%);
    }

    .trabajado-panel {
      background: linear-gradient(180deg, #fbfcfd 0%, #f8fafc 100%);
      border: 1px solid var(--stroke);
      border-radius: 16px;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .trabajado-panel select {
      width: 100%;
      border: 1px solid #d8dee6;
      border-radius: 12px;
      padding: 9px 34px 9px 10px;
      font-size: 12px;
      font-weight: 800;
      appearance: none;
      outline: none;
      background:
        linear-gradient(45deg, transparent 50%, #667085 50%),
        linear-gradient(135deg, #667085 50%, transparent 50%),
        linear-gradient(180deg, #fff 0%, #fbfcfe 100%);
      background-position:
        calc(100% - 16px) calc(50% - 3px),
        calc(100% - 10px) calc(50% - 3px),
        0 0;
      background-size:
        6px 6px,
        6px 6px,
        100% 100%;
      background-repeat: no-repeat;
    }

    .trabajado-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .small-note {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.28;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%) translateY(16px);
      z-index: 80;
      min-width: min(92vw, 280px);
      max-width: min(92vw, 420px);
      background: #111827;
      color: #fff;
      padding: 11px 14px;
      border-radius: 14px;
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.24);
      opacity: 0;
      pointer-events: none;
      transition: .22s ease;
      font-size: 12px;
      line-height: 1.35;
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.error {
      background: #b42318;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(15, 23, 42, 0.58);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .login-card {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,.5);
      border-radius: 24px;
      box-shadow: 0 20px 54px rgba(15, 23, 42, 0.24);
      padding: 20px 16px 16px;
      display: grid;
      gap: 14px;
    }

    .login-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .login-sub {
      margin: 0;
      font-size: 12px;
      line-height: 1.35;
      color: var(--muted);
    }

    .login-card input {
      width: 100%;
      border: 1px solid #d8dee6;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 20px;
      font-weight: 900;
      text-align: center;
      letter-spacing: 4px;
      outline: none;
      background: #fbfcfe;
    }

    .login-error {
      min-height: 18px;
      font-size: 12px;
      color: #b42318;
      text-align: center;
    }

    .hidden {
      display: none !important;
    }

    @media (min-width: 700px) {
      .cards {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div id="loginOverlay" class="overlay">
      <div class="login-card">
        <div>
          <h1 class="login-title">Trabajo general</h1>
          <p class="login-sub">Ingresa el código para abrir el panel del supervisor.</p>
        </div>

        <input
          id="codeInput"
          type="password"
          maxlength="6"
          inputmode="numeric"
          placeholder="••••••"
          autocomplete="off"
        />

        <button id="loginBtn" class="btn btn-green" type="button">Entrar</button>
        <div id="loginError" class="login-error"></div>
      </div>
    </div>

    <header class="topbar">
      <div class="topbar-inner">
        <div class="hero">
          <div>
            <h1 class="title">Trabajo general</h1>
            <div class="subtitle">Panel compacto para supervisor</div>
          </div>
          <div id="countBadge" class="count-pill">0 pares</div>
        </div>

        <div class="toolbar">
          <div class="search">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M21 21l-4.35-4.35M10.8 18a7.2 7.2 0 1 0 0-14.4 7.2 7.2 0 0 0 0 14.4Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <input
              id="searchInput"
              type="text"
              placeholder="Buscar orden, modelo, detalle, responsable..."
              autocomplete="off"
            />
          </div>

          <button id="refreshBtn" class="icon-btn" type="button" title="Actualizar">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M21 12a9 9 0 1 1-2.64-6.36M21 4v6h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="container">
      <div id="demoNotice" class="notice hidden">
        No se pudieron cargar opciones del backend. Se están usando opciones por defecto del frontend.
      </div>

      <div id="loadingBox" class="loading-box">Cargando trabajos...</div>
      <div id="errorBox" class="error-box hidden"></div>
      <div id="emptyBox" class="empty-box hidden">No hay trabajos para mostrar.</div>
      <div id="cards" class="cards hidden"></div>
    </main>
  </div>

  <div id="toast" class="toast"></div>

    const STATUS_CLASS_MAP = {
      "Agendado": "status-agendado",
      "En ruta": "status-proceso",
      "En proceso": "status-proceso",
      "Sin material": "status-sinmaterial",
      "Atrasado": "status-atrasado",
      "Trabajado": "status-trabajado",
      "Completado": "status-completado",
      "Entregado": "status-entregado",
      "Cancelado": "status-default",
      "Ya no quiere": "status-default",
      "Agendar con bot": "status-default",
      "Empaquetado": "status-default",
      "Agendado con courier": "status-default"
    };

    const STATUS_DOT_MAP = {
      "Agendado": "#bfc5cd",
      "En ruta": "#7b4db2",
      "En proceso": "#7b4db2",
      "Sin material": "#f59e0b",
      "Atrasado": "#d94841",
      "Trabajado": "#16a34a",
      "Completado": "#6941c6",
      "Entregado": "#047857",
      "Cancelado": "#ef4444",
      "Ya no quiere": "#ef4444",
      "Agendar con bot": "#667085",
      "Empaquetado": "#16a34a",
      "Agendado con courier": "#0ea5e9"
    };

    let TOKEN = sessionStorage.getItem(STORAGE_TOKEN_KEY) || "";
    let OPTIONS = JSON.parse(JSON.stringify(DEFAULT_OPTIONS));
    let TASKS = [];
    let REFRESH_TIMER = null;
    let SAVING_IDS = new Set();
    let OPEN_STATUS_ID = null;
    let LAST_SCROLL_Y = 0;

    function byId(id) {
      return document.getElementById(id);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showToast(message, isError = false) {
      const toast = byId("toast");
      toast.textContent = message || "";
      toast.className = "toast show" + (isError ? " error" : "");
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => {
        toast.className = "toast";
      }, 2400);
    }

    function showLogin(show = true) {
      byId("loginOverlay").classList.toggle("hidden", !show);
    }

    function setLoading(message = "Cargando trabajos...") {
      byId("loadingBox").textContent = message;
      byId("loadingBox").classList.remove("hidden");
      byId("errorBox").classList.add("hidden");
      byId("emptyBox").classList.add("hidden");
      byId("cards").classList.add("hidden");
    }

    function clearMessages() {
      byId("loadingBox").classList.add("hidden");
      byId("errorBox").classList.add("hidden");
      byId("emptyBox").classList.add("hidden");
    }

    function setError(message) {
      byId("loadingBox").classList.add("hidden");
      byId("cards").classList.add("hidden");
      byId("emptyBox").classList.add("hidden");
      byId("errorBox").textContent = message || "Ocurrió un error.";
      byId("errorBox").classList.remove("hidden");
    }

    function saveScroll() {
      LAST_SCROLL_Y = window.scrollY || window.pageYOffset || 0;
    }

    function restoreScroll() {
      requestAnimationFrame(() => {
        window.scrollTo({ top: LAST_SCROLL_Y, left: 0, behavior: "auto" });
      });
    }

    function safeRender() {
      saveScroll();
      renderTasks();
      restoreScroll();
    }

    function cleanDigits(value) {
      return String(value || "").replace(/\D+/g, "");
    }

    function boolText(value) {
      return value ? "Sí" : "No";
    }

    function prettyDateOnly(value) {
      if (!value) return "-";
      let s = String(value).trim();
      if (!s) return "-";
      if (s.includes(" ") && !s.includes("T")) s = s.replace(" ", "T");
      const d = new Date(s);
      if (isNaN(d)) return String(value);
      return d.toLocaleDateString("es-PE", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      });
    }

    function prettyDateCompact(value) {
      if (!value) return "-";
      let s = String(value).trim();
      if (!s) return "-";
      if (s.includes(" ") && !s.includes("T")) s = s.replace(" ", "T");
      const d = new Date(s);
      if (isNaN(d)) return String(value);
      return d.toLocaleString("es-PE", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).replace(",", "");
    }

    function statusClass(label) {
      return STATUS_CLASS_MAP[label] || "status-default";
    }

    function statusDotColor(label) {
      return STATUS_DOT_MAP[label] || "#667085";
    }

    function dedupeOptions(list, currentValue, currentLabel = null) {
      const out = [];
      const seen = new Set();

      if (currentValue && !list.some(x => String(x.value) === String(currentValue))) {
        out.push({
          value: currentValue,
          label: currentLabel || currentValue
        });
        seen.add(String(currentValue));
      }

      for (const item of list || []) {
        const key = String(item.value);
        if (seen.has(key)) continue;
        seen.add(key);
        out.push(item);
      }

      return out;
    }

    function estadoBonitoFromCode(code) {
      const key = String(code || "").trim();
      const match = OPTIONS.estados.find(x => String(x.value) === key);
      return match ? match.label : (key || "-");
    }

    function isListo(task) {
      return String(task.estado_code || "").trim() === "TRABAJADO";
    }

    function normalizeTask(raw) {
      const ordenTexto =
        raw.orden_texto ||
        (Array.isArray(raw.x_studio_orden_de_venta_1) ? raw.x_studio_orden_de_venta_1[1] : "") ||
        "";

      const estadoCode =
        raw.estado_code ||
        raw.x_studio_selection_field_3j_1ivn1ho1m ||
        "";

      const estadoLabel =
        raw.estado_label ||
        estadoBonitoFromCode(estadoCode);

      return {
        id: raw.id,
        modelo: raw.modelo || raw.x_studio_modelo_de_par_1 || "Sin modelo",
        detalle: raw.detalle || raw.x_studio_detalles_del_trabajo_1 || "",
        estado_code: estadoCode,
        estado_label: estadoLabel,
        fecha_a_trabajarlo:
          raw.fecha_a_trabajarlo ||
          raw.x_studio_fecha_a_trabajarlo_2 ||
          raw.fecha_trabajarlo ||
          "",
        fecha_entrega:
          raw.fecha_entrega ||
          raw.x_studio_fecha_de_entrega_1_1 ||
          raw.x_studio_fecha_de_entrega ||
          "",
        orden_texto: ordenTexto,
        orden_numero: raw.orden_numero || cleanDigits(ordenTexto),
        pasadores:
          typeof raw.pasadores !== "undefined" ? raw.pasadores : !!raw.x_studio_pasadores_1,
        plantillas:
          typeof raw.plantillas !== "undefined" ? raw.plantillas : !!raw.x_studio_plantillas_1,
        responsable: raw.responsable || raw.x_studio_responsable_r || "",
        ubicacion_seguimiento: raw.ubicacion_seguimiento || raw.x_studio_ubicacion_exacta_1 || "",
        trabajado_por: raw.trabajado_por || raw.x_studio_trabajado_por || "",
        _openTrabajadoPor: !!raw._openTrabajadoPor
      };
    }

    function filterTasks() {
      const q = (byId("searchInput").value || "").trim().toLowerCase();
      if (!q) return TASKS;

      return TASKS.filter(task => {
        const blob = [
          task.orden_texto,
          task.orden_numero,
          task.modelo,
          task.detalle,
          task.estado_label,
          task.responsable,
          task.ubicacion_seguimiento,
          task.trabajado_por
        ].join(" ").toLowerCase();

        return blob.includes(q);
      });
    }

    function mergeTask(updated) {
      const idx = TASKS.findIndex(x => String(x.id) === String(updated.id));
      if (idx >= 0) {
        TASKS[idx] = {
          ...TASKS[idx],
          ...normalizeTask(updated),
          _openTrabajadoPor: false
        };
      }
    }

    function patchTask(tareaId, patch) {
      const idx = TASKS.findIndex(x => String(x.id) === String(tareaId));
      if (idx >= 0) {
        TASKS[idx] = {
          ...TASKS[idx],
          ...patch
        };
      }
    }

    async function api(path, method = "GET", body = null) {
      const headers = {};

      if (TOKEN) headers["X-Encargado-Token"] = TOKEN;
      if (body !== null) headers["Content-Type"] = "application/json";

      const response = await fetch(API_ROOT + path, {
        method,
        headers,
        body: body !== null ? JSON.stringify(body) : undefined,
        cache: "no-store"
      });

      const data = await response.json().catch(() => ({}));

      if (response.status === 401) {
        TOKEN = "";
        sessionStorage.removeItem(STORAGE_TOKEN_KEY);
        showLogin(true);
        throw new Error(data.error || "Tu sesión venció.");
      }

      if (!response.ok) {
        throw new Error(data.error || "No se pudo completar la operación.");
      }

      return data;
    }

    async function loadOptions() {
      byId("demoNotice").classList.add("hidden");
      try {
        const data = await api("/options", "GET");
        OPTIONS = {
          responsables: Array.isArray(data.responsables) && data.responsables.length ? data.responsables : DEFAULT_OPTIONS.responsables,
          ubicaciones: Array.isArray(data.ubicaciones) && data.ubicaciones.length ? data.ubicaciones : DEFAULT_OPTIONS.ubicaciones,
          trabajado_por: Array.isArray(data.trabajado_por) && data.trabajado_por.length ? data.trabajado_por : DEFAULT_OPTIONS.trabajado_por,
          estados: Array.isArray(data.estados) && data.estados.length ? data.estados : DEFAULT_OPTIONS.estados
        };
      } catch (error) {
        OPTIONS = JSON.parse(JSON.stringify(DEFAULT_OPTIONS));
        byId("demoNotice").classList.remove("hidden");
      }
    }

    async function loadTasks(silent = false) {
      if (!silent) setLoading("Cargando trabajos...");

      try {
        const data = await api("/tasks", "GET");
        TASKS = (Array.isArray(data.result) ? data.result : []).map(normalizeTask);
        safeRender();
      } catch (error) {
        if (!TASKS.length) setError(error.message || "No se pudieron cargar los trabajos.");
        else showToast(error.message || "No se pudo actualizar.", true);
      }
    }

    function statusMenuHtml(task, saving) {
      const currentLabel = task.estado_label || estadoBonitoFromCode(task.estado_code);
      const list = dedupeOptions(OPTIONS.estados, task.estado_code, currentLabel);

      const items = list.map(item => {
        const label = item.label;
        const active = String(item.value) === String(task.estado_code || "");
        return `
          <button
            type="button"
            class="status-option ${active ? "active" : ""} js-status-option"
            data-id="${task.id}"
            data-value="${escapeHtml(item.value)}"
          >
            <span class="dot" style="background:${statusDotColor(label)}"></span>
            <span>${escapeHtml(label)}</span>
            <span class="check">✓</span>
          </button>
        `;
      }).join("");

      return `
        <div class="status-wrap">
          <button
            type="button"
            class="status-btn ${statusClass(currentLabel)} js-status-btn"
            data-id="${task.id}"
            ${saving ? "disabled" : ""}
          >
            ${escapeHtml(currentLabel)}
          </button>

          <div class="status-menu ${OPEN_STATUS_ID === task.id ? "open" : ""}" id="statusMenu_${task.id}">
            ${items}
          </div>
        </div>
      `;
    }

        <article class="card" data-id="${task.id}">
          <div class="head">
            <div class="title-line">
              <span class="orden-inline">${escapeHtml(task.orden_numero || task.orden_texto || "-")}</span>
              <span>${escapeHtml(task.modelo)}</span>
            </div>
            ${statusMenuHtml(task, saving)}
          </div>

          <div class="detail-box">
            <div class="k-label">Detalle de trabajo</div>
            <div class="detail-text">${escapeHtml(task.detalle || "-")}</div>

              <div class="k-label">Trabajarlo</div>

            <div class="mini-card">

                ${dedupeOptions(OPTIONS.responsables, task.responsable).map(item => {
                  const selected = String(item.value) === String(task.responsable || "") ? "selected" : "";

              <div class="k-label">Ubic.</div>

            </button>

                  <option value="">Seleccionar</option>
                  ${dedupeOptions(OPTIONS.trabajado_por, task.trabajado_por).map(item => {
                    const selected = String(item.value) === String(task.trabajado_por || "") ? "selected" : "";
                    return `<option value="${escapeHtml(item.value)}" ${selected}>${escapeHtml(item.label)}</option>`;
                  }).join("")}
                </select>

                <div class="trabajado-actions">
                  <button class="btn btn-green js-confirm-trabajado" data-id="${task.id}" ${saving ? "disabled" : ""}>Guardar</button>
                  <button class="btn btn-muted js-cancel-trabajado" data-id="${task.id}" ${saving ? "disabled" : ""}>Cancelar</button>

    function renderTasks() {
      clearMessages();

      const filtered = filterTasks();
      byId("countBadge").textContent = `${filtered.length} pares`;

      if (!filtered.length) {
        byId("cards").classList.add("hidden");
        byId("emptyBox").classList.remove("hidden");
        return;
      }

      byId("emptyBox").classList.add("hidden");
      byId("cards").innerHTML = filtered.map(cardHtml).join("");
      byId("cards").classList.remove("hidden");
      bindEvents();
    }

    function closeAllStatusMenus() {
      OPEN_STATUS_ID = null;
      document.querySelectorAll(".status-menu.open").forEach(el => el.classList.remove("open"));
    }

    async function quickUpdateTask(tareaId, payloadData, onRollback, successMsg, patch = null) {
      const key = String(tareaId);
      if (SAVING_IDS.has(key)) return;

      saveScroll();
      SAVING_IDS.add(key);

      if (patch) {
        patchTask(tareaId, patch);
        safeRender();
      }

      try {
        const data = await api(`/task/${tareaId}/update`, "POST", { data: payloadData });

        if (data.task) mergeTask(data.task);
        safeRender();
        showToast(successMsg || data.message || "Actualizado.");
      } catch (error) {
        if (typeof onRollback === "function") onRollback();
        if (!patch) safeRender();
        showToast(error.message || "No se pudo guardar.", true);
      } finally {
        SAVING_IDS.delete(key);
      }
    }

    async function doToggleListo(tareaId, trabajadoPor = null) {
      const key = String(tareaId);
      if (SAVING_IDS.has(key)) return;

      saveScroll();
      SAVING_IDS.add(key);

      const current = TASKS.find(x => String(x.id) === String(tareaId));
      if (!current) return;

      const estabaListo = isListo(current);

      if (!estabaListo) {
        patchTask(tareaId, {
          estado_code: "TRABAJADO",
          estado_label: "Trabajado",
          trabajado_por: trabajadoPor || current.trabajado_por || "",
          _openTrabajadoPor: false
        });
      } else {
        patchTask(tareaId, {
          estado_code: "03_approved",
          estado_label: "En proceso",
          trabajado_por: ""
        });
      }

      safeRender();

      try {
        const body = trabajadoPor ? { trabajado_por: trabajadoPor } : {};
        const data = await api(`/task/${tareaId}/toggle_listo`, "POST", body);

        if (data.task) mergeTask(data.task);
        safeRender();
        showToast(data.message || "Actualizado.");
      } catch (error) {
        await loadTasks(true);
        showToast(error.message || "No se pudo cambiar el listo.", true);
      } finally {
        SAVING_IDS.delete(key);
      }
    }

    function bindEvents() {
      document.querySelectorAll(".js-responsable").forEach(select => {
        select.addEventListener("change", async function () {
          const tareaId = this.dataset.id;
          const prev = this.dataset.prev || "";
          const value = this.value || "";

          await quickUpdateTask(
            tareaId,
            { x_studio_responsable_r: value || false },
            () => { this.value = prev; },
            "Responsable actualizado.",
            { responsable: value || "" }
          );
        });
      });

      document.querySelectorAll(".js-ubicacion").forEach(select => {
        select.addEventListener("change", async function () {
          const tareaId = this.dataset.id;
          const prev = this.dataset.prev || "";
          const value = this.value || "";

          await quickUpdateTask(
            tareaId,
            { x_studio_ubicacion_exacta_1: value || false },
            () => { this.value = prev; },
            "Ubicación actualizada.",
            { ubicacion_seguimiento: value || "" }
          );
        });
      });

      document.querySelectorAll(".js-status-btn").forEach(btn => {
        btn.addEventListener("click", function (e) {
          e.stopPropagation();
          const tareaId = Number(this.dataset.id);
          OPEN_STATUS_ID = OPEN_STATUS_ID === tareaId ? null : tareaId;
          safeRender();
        });
      });

      document.querySelectorAll(".js-status-option").forEach(btn => {
        btn.addEventListener("click", async function (e) {
          e.stopPropagation();
          const tareaId = this.dataset.id;
          const value = this.dataset.value || "";
          const task = TASKS.find(x => String(x.id) === String(tareaId));
          if (!task) return;

          const prevCode = task.estado_code;
          const prevLabel = task.estado_label;
          const newLabel = estadoBonitoFromCode(value);

          OPEN_STATUS_ID = null;

          await quickUpdateTask(
            tareaId,
            { x_studio_selection_field_3j_1ivn1ho1m: value || false },
            () => {
              patchTask(tareaId, {
                estado_code: prevCode,
                estado_label: prevLabel
              });
              safeRender();
            },
            "Estado actualizado.",
            {
              estado_code: value,
              estado_label: newLabel
            }
          );
        });
      });

      document.querySelectorAll(".js-toggle-listo").forEach(btn => {
        btn.addEventListener("click", async function () {
          const tareaId = this.dataset.id;
          const task = TASKS.find(t => String(t.id) === String(tareaId));
          if (!task) return;

          if (isListo(task)) {
            const ok = confirm("La tarea ya está en LISTO. ¿Deseas desmarcarla?");
            if (!ok) return;
            await doToggleListo(tareaId, null);
            return;
          }

          TASKS = TASKS.map(t => ({
            ...t,
            _openTrabajadoPor: String(t.id) === String(tareaId) ? !t._openTrabajadoPor : false
          }));
          safeRender();
        });
      });

      document.querySelectorAll(".js-confirm-trabajado").forEach(btn => {
        btn.addEventListener("click", async function () {
          const tareaId = this.dataset.id;
          const select = byId(`trabajadoPor_${tareaId}`);
          const trabajadoPor = (select?.value || "").trim();

          if (!trabajadoPor) {
            showToast("Selecciona “Trabajado por”.", true);
            return;
          }

          await doToggleListo(tareaId, trabajadoPor);
        });
      });

      document.querySelectorAll(".js-cancel-trabajado").forEach(btn => {
        btn.addEventListener("click", function () {
          TASKS = TASKS.map(t => ({
            ...t,
            _openTrabajadoPor: false
          }));
          safeRender();
        });
      });
    }

    async function doLogin() {
      const input = byId("codeInput");
      const err = byId("loginError");
      err.textContent = "";

      try {
        const code = (input.value || "").trim();
        if (!code) {
          err.textContent = "Ingresa el código.";
          return;
        }

        const response = await fetch(API_ROOT + "/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code })
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || "Código inválido.");

        TOKEN = data.token || "";
        sessionStorage.setItem(STORAGE_TOKEN_KEY, TOKEN);
        input.value = "";

        showLogin(false);
        await initProtected();
        showToast("Acceso concedido.");
      } catch (error) {
        err.textContent = error.message || "No se pudo ingresar.";
      }
    }

    async function loadTasksInitial() {
      await loadOptions();
      await loadTasks(false);
      startAutoRefresh();
    }

    async function initProtected() {
      await loadTasksInitial();
    }

    function startAutoRefresh() {
      clearInterval(REFRESH_TIMER);
      REFRESH_TIMER = setInterval(async () => {
        if (!TOKEN) return;
        if (SAVING_IDS.size > 0) return;
        const currentSearch = byId("searchInput").value;
        saveScroll();
        await loadTasks(true);
        byId("searchInput").value = currentSearch;
        safeRender();
      }, REFRESH_MS);
    }

    window.addEventListener("click", function () {
      if (OPEN_STATUS_ID !== null) {
        OPEN_STATUS_ID = null;
        safeRender();
      }
    });

    window.addEventListener("load", async () => {
      byId("loginBtn").addEventListener("click", doLogin);

      byId("codeInput").addEventListener("keydown", e => {
        if (e.key === "Enter") doLogin();
      });

      byId("searchInput").addEventListener("input", () => {
        safeRender();
      });

      byId("refreshBtn").addEventListener("click", async () => {
        const currentSearch = byId("searchInput").value;
        saveScroll();
        await loadTasks(true);
        byId("searchInput").value = currentSearch;
        safeRender();
      });

      if (TOKEN) {
        try {
          showLogin(false);
          await initProtected();
        } catch (error) {
          TOKEN = "";
          sessionStorage.removeItem(STORAGE_TOKEN_KEY);
          showLogin(true);
          setLoading("Cargando trabajos...");
        }
      } else {
        showLogin(true);
        setLoading("Cargando trabajos...");
      }
    });
  </script>
</body>
</html>
