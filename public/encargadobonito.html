<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mesa de Trabajo</title>

<style>

body{
    font-family: system-ui;
    background:#f4f6f8;
    margin:0;
    padding:10px;
}

.container{
    max-width:600px;
    margin:auto;
}

.card{
    background:white;
    border-radius:16px;
    padding:14px;
    margin-bottom:14px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.title{
    font-size:18px;
    font-weight:700;
    margin-bottom:6px;
}

.estado{
    font-size:12px;
    background:#eef1f4;
    padding:4px 10px;
    border-radius:8px;
    display:inline-block;
    margin-bottom:10px;
}

.detalle{
    font-size:13px;
    color:#555;
    margin-bottom:10px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
}

.field{
    background:#f2f4f7;
    padding:8px;
    border-radius:8px;
}

.label{
    font-size:11px;
    color:#666;
}

.value{
    font-size:13px;
    font-weight:600;
}

select{
    width:100%;
    padding:8px;
    border-radius:8px;
    border:none;
    margin-top:4px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-weight:700;
    margin-top:8px;
}

.btn-listo{
    background:#10a600;
    color:white;
}

.btn-completo{
    background:#7c5a84;
    color:white;
}

.fecha{
    background:#dfefff;
}

</style>
</head>

<body>

<div class="container" id="tasks"></div>

<script>

async function cargar(){

const res = await fetch("/tareas");
const data = await res.json();

const cont = document.getElementById("tasks");
cont.innerHTML="";

data.forEach(t=>{

cont.innerHTML+=`
<div class="card">

<div class="title">${t.nombre}</div>

<div class="estado">
Estado:
<select onchange="cambiarEstado(${t.id},this.value)">
<option ${t.estado=="Agendado"?"selected":""}>Agendado</option>
<option ${t.estado=="En Proceso"?"selected":""}>En Proceso</option>
<option ${t.estado=="Terminado"?"selected":""}>Terminado</option>
</select>
</div>

<div class="detalle">
${t.detalle}
</div>

<div class="grid">

<div class="field fecha">
<div class="label">Fecha a trabajarlo</div>
<div class="value">${t.fecha_trabajo || "-"}</div>
</div>

<div class="field">
<div class="label">Fecha entrega</div>
<div class="value">${t.fecha_entrega || "-"}</div>
</div>

<div class="field">
<div class="label">Orden</div>
<div class="value">${t.orden}</div>
</div>

<div class="field">
<div class="label">Pasadores</div>
<div class="value">${t.pasadores}</div>
</div>

<div class="field">
<div class="label">Plantillas</div>
<div class="value">${t.plantillas}</div>
</div>

<div class="field">
<div class="label">Responsable</div>
<select onchange="cambiarResponsable(${t.id},this.value)">
<option>Seleccionar</option>
<option ${t.responsable=="Pedro"?"selected":""}>Pedro</option>
<option ${t.responsable=="Jorge"?"selected":""}>Jorge</option>
<option ${t.responsable=="Yuli"?"selected":""}>Yuli</option>
</select>
</div>

<div class="field">
<div class="label">Ubicación</div>
<select onchange="cambiarUbicacion(${t.id},this.value)">
<option>Seleccionar</option>
<option ${t.ubicacion=="Mesa"?"selected":""}>Mesa</option>
<option ${t.ubicacion=="Anchadora"?"selected":""}>Anchadora</option>
<option ${t.ubicacion=="Lavado"?"selected":""}>Lavado</option>
</select>
</div>

</div>

<button class="btn-listo" onclick="marcarListo(${t.id})">
✔ Marcar listo
</button>

<button class="btn-completo" onclick="completar(${t.id})">
Completar
</button>

</div>
`;

})

}

async function cambiarResponsable(id,val){

await fetch("/task/"+id+"/responsable",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({responsable:val})
})

}

async function cambiarUbicacion(id,val){

await fetch("/task/"+id+"/ubicacion",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({ubicacion:val})
})

}

async function cambiarEstado(id,val){

await fetch("/task/"+id+"/estado",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({estado:val})
})

}

async function marcarListo(id){

await fetch("/task/"+id+"/listo",{method:"POST"})
cargar()

}

async function completar(id){

await fetch("/task/"+id+"/completar",{method:"POST"})
cargar()

}

cargar()

</script>

</body>
</html>
